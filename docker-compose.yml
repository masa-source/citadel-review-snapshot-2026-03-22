# Project Binder - PostgreSQL (Phase 1 DB 移行)
# .env で POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB を上書き可能

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-report_binder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-report_binder}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
