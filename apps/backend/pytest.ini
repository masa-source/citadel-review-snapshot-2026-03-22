[pytest]
# バックエンドルートをパスに通す
pythonpath = .

# pytest-asyncio の設定
asyncio_mode = auto

# テストディレクトリ
testpaths = tests

# テストファイルのパターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 出力設定（Windows で PermissionError を防ぐため一時ディレクトリをワークスペース内に）
addopts = -v --tb=short --basetemp=.pytest_tmp --strict-markers --timeout=30

# カスタムマーカー
markers =
    ai_eval: AIのプロンプト精度を評価する実機テスト


# 警告フィルタ
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
